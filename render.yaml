services:
  - type: web
    name: n8n
    env: docker
    plan: free
    autoDeploy: true

    envVars:
      - key: DB_TYPE
        value: postgresdb

      - key: DB_POSTGRESDB_HOST
        value: aws-1-us-east-2.pooler.supabase.com

      - key: DB_POSTGRESDB_PORT
        value: 6543

      - key: DB_POSTGRESDB_DATABASE
        value: postgres

      - key: DB_POSTGRESDB_USER
        value: postgres.ksgfneyaqbzrfsywjvfv

      - key: DB_POSTGRESDB_PASSWORD
        value: Petrolero.100

      - key: DB_POSTGRESDB_SSL_ENABLED
        value: true

      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: false

      - key: N8N_SECURE_COOKIE
        value: true

      - key: N8N_HOST
        value: tu-app.onrender.com

      - key: N8N_PROTOCOL
        value: https

      - key: WEBHOOK_URL
        value: https://tu-app.onrender.com/

      - key: GENERIC_TIMEZONE
        value: America/La_Paz